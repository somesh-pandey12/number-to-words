<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number to Words</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      text-align: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      color: #1a1a2e;
      letter-spacing: 0.01em;
    }

    h1 span {
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 400;
      color: #888;
      display: block;
      margin-top: 4px;
      letter-spacing: 0;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.25rem;
    }

    .num-input {
      width: 100%;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 36px;
      font-weight: 600;
      border: none;
      border-bottom: 2px solid #e0e0e0;
      outline: none;
      padding-bottom: 8px;
      color: #1a1a2e;
      background: transparent;
      transition: border-color 0.2s;
      letter-spacing: 0.02em;
    }

    .num-input:focus { border-bottom-color: #4361ee; }

    .num-input::placeholder {
      color: #ccc;
      font-weight: 400;
    }

    .formatted-num {
      margin-top: 0.6rem;
      font-size: 13px;
      color: #999;
      font-style: italic;
      min-height: 18px;
    }

    .word-result {
      margin-top: 1.25rem;
      padding: 1.25rem 1.25rem 1.25rem 1.5rem;
      background: #f7f8ff;
      border-radius: 10px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      color: #1a1a2e;
      min-height: 64px;
      line-height: 1.7;
      border-left: 3px solid #4361ee;
    }

    .word-result.placeholder {
      color: #bbb;
      font-family: 'Segoe UI', sans-serif;
      font-size: 15px;
      font-style: italic;
    }

    .copy-btn {
      margin-top: 1rem;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      background: #f7f8ff;
      border: 1.5px solid #4361ee;
      color: #4361ee;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
      font-family: 'Segoe UI', sans-serif;
    }

    .copy-btn:hover { background: #e8edff; }
    .copy-btn.copied { background: #e8fff3; border-color: #2ecc71; color: #2ecc71; }
  </style>
</head>
<body>

<div class="container">
  <h1>
    Number to Words
    <span>Indian numbering system · Lakhs & Crores</span>
  </h1>

  <div class="card">
    <p class="card-title">Enter Number</p>
    <input
      class="num-input"
      id="numInput"
      type="text"
      placeholder="0"
      oninput="convertNum()"
      autofocus
    />
    <div class="formatted-num" id="formattedNum"></div>
    <div class="word-result placeholder" id="wordResult">Words will appear here...</div>
    <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy Words</button>
  </div>
</div>

<script>
  const ones = ['','one','two','three','four','five','six','seven','eight','nine',
    'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen',
    'seventeen','eighteen','nineteen'];
  const tens_w = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];

  function belowHundred(n) {
    if (n === 0) return '';
    if (n < 20) return ones[n];
    const t = Math.floor(n / 10), r = n % 10;
    return tens_w[t] + (r ? ' ' + ones[r] : '');
  }

  function belowThousand(n) {
    if (n === 0) return '';
    if (n < 100) return belowHundred(n);
    const h = Math.floor(n / 100), r = n % 100;
    return ones[h] + ' hundred' + (r ? ' ' + belowHundred(r) : '');
  }

  // Indian system: ones, thousands, lakhs, crores
  function intToWords(n) {
    if (n === 0) return 'zero';

    let result = '';

    const crore = Math.floor(n / 1e7);
    n %= 1e7;
    const lakh = Math.floor(n / 1e5);
    n %= 1e5;
    const thousand = Math.floor(n / 1e3);
    n %= 1e3;
    const rest = n;

    if (crore > 0)   result += belowThousand(crore) + ' crore';
    if (lakh > 0)    result += (result ? ' ' : '') + belowHundred(lakh) + ' lakh';
    if (thousand > 0)result += (result ? ' ' : '') + belowHundred(thousand) + ' thousand';
    if (rest > 0)    result += (result ? ' ' : '') + belowThousand(rest);

    return result.trim();
  }

  function toWords(raw) {
    raw = raw.trim();
    if (raw === '' || isNaN(raw)) return null;
    const neg = raw.startsWith('-');
    const abs = neg ? raw.slice(1) : raw;
    const parts = abs.split('.');
    const intPart = parseInt(parts[0], 10) || 0;
    let word = (neg ? 'negative ' : '') + intToWords(intPart);

    if (parts.length > 1 && parts[1].length > 0) {
      const dec = parts[1].replace(/0+$/, '');
      if (dec.length > 0) {
        const decNum = parseInt(dec, 10);
        word += ' and ' + intToWords(decNum);
        const place = ['','tenth','hundredth','thousandth','ten-thousandth'];
        const p = dec.length <= 4 ? place[dec.length] : '';
        if (p) word += ' ' + (decNum === 1 ? p : p + 's');
      }
    }
    return word.charAt(0).toUpperCase() + word.slice(1);
  }

  // Indian formatted number: e.g. 1,23,45,678
  function formatIndian(raw) {
    const parts = raw.split('.');
    let intStr = parts[0].replace(/^-/, '');
    const neg = parts[0].startsWith('-');
    if (intStr.length <= 3) return (neg ? '-' : '') + intStr + (parts[1] !== undefined ? '.' + parts[1] : '');
    const last3 = intStr.slice(-3);
    const rest = intStr.slice(0, -3);
    const formatted = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + ',' + last3;
    return (neg ? '-' : '') + formatted + (parts[1] !== undefined ? '.' + parts[1] : '');
  }

  function convertNum() {
    const v = document.getElementById('numInput').value.trim();
    const wordEl = document.getElementById('wordResult');
    const fmtEl  = document.getElementById('formattedNum');
    const btn    = document.getElementById('copyBtn');

    btn.classList.remove('copied');
    btn.textContent = 'Copy Words';

    if (!v || isNaN(v)) {
      wordEl.textContent = 'Words will appear here...';
      wordEl.classList.add('placeholder');
      fmtEl.textContent = '';
      return;
    }

    const words = toWords(v);
    wordEl.textContent = words;
    wordEl.classList.remove('placeholder');
    fmtEl.textContent = '= ' + formatIndian(v);
  }

  function copyText() {
    const text = document.getElementById('wordResult').textContent;
    if (!text || text === 'Words will appear here...') return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy Words';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>

</body>
</html>
